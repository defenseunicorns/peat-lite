[workspace]

[package]
name = "peat-lite-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"

[dependencies.peat-lite]
path = ".."

[[bin]]
name = "fuzz_canned_message_event_decode"
