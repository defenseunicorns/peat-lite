name = "fuzz_canned_message_ack_decode"
path = "fuzz_targets/fuzz_canned_message_ack_decode.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_gcounter_decode"
path = "fuzz_targets/fuzz_gcounter_decode.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_canned_message_signed_decode"
path = "fuzz_targets/fuzz_canned_message_signed_decode.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_decode_header"
path = "fuzz_targets/fuzz_decode_header.rs"
test = false
doc = false
bench = false
